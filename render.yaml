services:
  - type: web
    name: synthios
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: SYNTHIOS_STATE_DIR
        value: /data/.synthios
      - key: SYNTHIOS_WORKSPACE_DIR
        value: /data/workspace
      - key: SYNTHIOS_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: synthios-data
      mountPath: /data
      sizeGB: 1
