name: Synthios
options:
  bundleIdPrefix: ai.synthios
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  SynthiosKit:
    path: ../shared/SynthiosKit
  Swabble:
    path: ../../Swabble

schemes:
  Synthios:
    shared: true
    build:
      targets:
        Synthios: all
    test:
      targets:
        - SynthiosTests
        - SynthiosLogicTests
  SynthiosLogicTests:
    shared: true
    build:
      targets:
        SynthiosLogicTests: all
    test:
      targets:
        - SynthiosLogicTests

targets:
  Synthios:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: SynthiosShareExtension
        embed: true
      - target: SynthiosActivityWidget
        embed: true
      - target: SynthiosWatchApp
      - package: SynthiosKit
      - package: SynthiosKit
        product: SynthiosChatUI
      - package: SynthiosKit
        product: SynthiosProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Synthios.entitlements
        CODE_SIGN_STYLE: "$(SYNTHIOS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SYNTHIOS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SYNTHIOS_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SYNTHIOS_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          SYNTHIOS_PUSH_TRANSPORT: direct
          SYNTHIOS_PUSH_DISTRIBUTION: local
          SYNTHIOS_PUSH_RELAY_BASE_URL: ""
          SYNTHIOS_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          SYNTHIOS_PUSH_TRANSPORT: direct
          SYNTHIOS_PUSH_DISTRIBUTION: local
          SYNTHIOS_PUSH_RELAY_BASE_URL: ""
          SYNTHIOS_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Synthios
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.synthios.ios
            CFBundleURLSchemes:
              - synthios
        CFBundleShortVersionString: "$(SYNTHIOS_MARKETING_VERSION)"
        CFBundleVersion: "$(SYNTHIOS_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.synthios.ios.bgrefresh
        NSLocalNetworkUsageDescription: Synthios discovers and connects to your Synthios gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _synthios-gw._tcp
        NSCameraUsageDescription: Synthios can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Synthios uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Synthios can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Synthios needs microphone access for voice wake.
        NSMotionUsageDescription: Synthios may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: Synthios needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: Synthios uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        SynthiosPushTransport: "$(SYNTHIOS_PUSH_TRANSPORT)"
        SynthiosPushDistribution: "$(SYNTHIOS_PUSH_DISTRIBUTION)"
        SynthiosPushRelayBaseURL: "$(SYNTHIOS_PUSH_RELAY_BASE_URL)"
        SynthiosPushAPNsEnvironment: "$(SYNTHIOS_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  SynthiosShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: SynthiosKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SYNTHIOS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SYNTHIOS_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SYNTHIOS_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(SYNTHIOS_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Synthios Share
        CFBundleShortVersionString: "$(SYNTHIOS_MARKETING_VERSION)"
        CFBundleVersion: "$(SYNTHIOS_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  SynthiosActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/SynthiosActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SYNTHIOS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SYNTHIOS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(SYNTHIOS_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: Synthios Activity
        CFBundleShortVersionString: "$(SYNTHIOS_MARKETING_VERSION)"
        CFBundleVersion: "$(SYNTHIOS_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  SynthiosWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: SynthiosWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(SYNTHIOS_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Synthios
        CFBundleShortVersionString: "$(SYNTHIOS_MARKETING_VERSION)"
        CFBundleVersion: "$(SYNTHIOS_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(SYNTHIOS_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  SynthiosWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(SYNTHIOS_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Synthios
        CFBundleShortVersionString: "$(SYNTHIOS_MARKETING_VERSION)"
        CFBundleVersion: "$(SYNTHIOS_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(SYNTHIOS_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  SynthiosTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: Synthios
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SYNTHIOS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SYNTHIOS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.synthios.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Synthios.app/Synthios"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: SynthiosTests
        CFBundleShortVersionString: "$(SYNTHIOS_MARKETING_VERSION)"
        CFBundleVersion: "$(SYNTHIOS_BUILD_VERSION)"

  SynthiosLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: SynthiosKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(SYNTHIOS_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(SYNTHIOS_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.synthios.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: SynthiosLogicTests
        CFBundleShortVersionString: "$(SYNTHIOS_MARKETING_VERSION)"
        CFBundleVersion: "$(SYNTHIOS_BUILD_VERSION)"
